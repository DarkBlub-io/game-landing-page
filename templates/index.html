<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ game.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <img src="{{ url_for('static', filename='images/icon.png') }}" alt="icon" class="game-icon">

            <div class="game-meta">
                <h1>{{ game.name }}</h1>
                <p class="category">{{ game.category }}</p>
                <p class="developer">{{ game.developer }}</p>
            </div>
        </div>

        <div class="screenshots">
            {% for shot in screenshots %}
                <img src="{{ url_for('static', filename=shot) }}" alt="Screenshot">
            {% endfor %}
        </div>

        <div class="info-card">
            <div class="info-row">
                <span>Tên</span>
                <strong>{{ game.name }}</strong>
            </div>
            <div class="info-row">
                <span>Chuyên mục</span>
                <strong>{{ game.category }}</strong>
            </div>
            <div class="info-row">
                <span>Nhà phát triển</span>
                <strong>{{ game.developer }}</strong>
            </div>
            <div class="info-row">
                <span>Phiên bản mới nhất</span>
                <strong>{{ game.version }}</strong>
            </div>
